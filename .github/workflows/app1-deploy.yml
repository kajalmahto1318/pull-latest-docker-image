# ─────────────────────────────────────────────────────────────────────────────
# App1 Products — Build, Push, Deploy to GREEN
# All infrastructure ARNs auto-discovered — only AWS keys needed in secrets
# ─────────────────────────────────────────────────────────────────────────────
name: "App1 Products — Deploy"

on:
  push:
    branches: [ main ]
    paths:
      - "apps/app1-products/**"
      - ".github/workflows/app1-deploy.yml"
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPO: app1-products
  APP_NAME: app1
  SSM_TAG: /apps/app1/image_tag
  SSM_RELEASE: /apps/releases/current
  APP_PORT: 5001
  PROJECT: bluegreen

jobs:
  # ═══ JOB 1: TEST ═══════════════════════════════════════════════════════════
  test:
    name: "Test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/app1-products
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt pytest
      - run: pytest tests/ -v

  # ═══ JOB 2: BUILD & PUSH ═══════════════════════════════════════════════════
  build:
    name: "Build & Push"
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - id: tag
        run: |
          TAG="git-${GITHUB_SHA::12}"
          echo "image_tag=$TAG" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: apps/app1-products
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO }}:${{ steps.tag.outputs.image_tag }}
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO }}:latest
          build-args: APP_VERSION=${{ steps.tag.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - run: echo "✅ Pushed ${{ env.ECR_REPO }}:${{ steps.tag.outputs.image_tag }}"

  # ═══ JOB 3: DEPLOY TO GREEN ═══════════════════════════════════════════════
  deploy:
    name: "Deploy to GREEN"
    needs: build
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: green-deployment
      cancel-in-progress: false

    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Auto-discover all infrastructure ARNs ──
      - name: "Discover infrastructure"
        id: infra
        run: |
          echo "🔍 Auto-discovering infrastructure..."

          # ASG names (by naming convention)
          ASG_BLUE="${{ env.PROJECT }}-asg-blue"
          ASG_GREEN="${{ env.PROJECT }}-asg-green"

          # ALB ARN (by name)
          ALB_ARN=$(aws elbv2 describe-load-balancers --names "${{ env.PROJECT }}-alb" \
            --query "LoadBalancers[0].LoadBalancerArn" --output text)

          # Listener ARN
          LISTENER_ARN=$(aws elbv2 describe-listeners --load-balancer-arn "$ALB_ARN" \
            --query "Listeners[0].ListenerArn" --output text)

          # Target Group ARNs (by name)
          TG_APP1_BLUE=$(aws elbv2 describe-target-groups --names "${{ env.PROJECT }}-app1-blue" \
            --query "TargetGroups[0].TargetGroupArn" --output text)
          TG_APP1_GREEN=$(aws elbv2 describe-target-groups --names "${{ env.PROJECT }}-app1-green" \
            --query "TargetGroups[0].TargetGroupArn" --output text)
          TG_APP2_BLUE=$(aws elbv2 describe-target-groups --names "${{ env.PROJECT }}-app2-blue" \
            --query "TargetGroups[0].TargetGroupArn" --output text)
          TG_APP2_GREEN=$(aws elbv2 describe-target-groups --names "${{ env.PROJECT }}-app2-green" \
            --query "TargetGroups[0].TargetGroupArn" --output text)

          # Export all as step outputs
          echo "asg_blue=$ASG_BLUE" >> "$GITHUB_OUTPUT"
          echo "asg_green=$ASG_GREEN" >> "$GITHUB_OUTPUT"
          echo "listener_arn=$LISTENER_ARN" >> "$GITHUB_OUTPUT"
          echo "tg_app1_blue=$TG_APP1_BLUE" >> "$GITHUB_OUTPUT"
          echo "tg_app1_green=$TG_APP1_GREEN" >> "$GITHUB_OUTPUT"
          echo "tg_app2_blue=$TG_APP2_BLUE" >> "$GITHUB_OUTPUT"
          echo "tg_app2_green=$TG_APP2_GREEN" >> "$GITHUB_OUTPUT"

          echo "✅ All infrastructure discovered automatically"
          echo "  ALB Listener: $LISTENER_ARN"
          echo "  ASG Blue: $ASG_BLUE | ASG Green: $ASG_GREEN"

      # ── Queue status ──
      - name: "Deploy queue status"
        run: |
          echo "═══════════════════════════════════════"
          echo "  🔒 DEPLOY LOCK ACQUIRED"
          echo "  App:  ${{ env.APP_NAME }}"
          echo "  Tag:  ${{ needs.build.outputs.image_tag }}"
          echo "═══════════════════════════════════════"

          ACTIVE=$(aws autoscaling describe-instance-refreshes \
            --auto-scaling-group-name "${{ steps.infra.outputs.asg_green }}" \
            --query "InstanceRefreshes[?Status=='InProgress'].InstanceRefreshId" \
            --output text 2>/dev/null || echo "")

          if [ -n "$ACTIVE" ] && [ "$ACTIVE" != "None" ]; then
            echo "⏳ Waiting for active refresh to finish..."
            for i in $(seq 1 15); do
              STATUS=$(aws autoscaling describe-instance-refreshes \
                --auto-scaling-group-name "${{ steps.infra.outputs.asg_green }}" \
                --instance-refresh-ids "$ACTIVE" \
                --query "InstanceRefreshes[0].Status" --output text 2>/dev/null || echo "")
              echo "   [$i/15] Refresh: $STATUS"
              [ "$STATUS" = "Successful" ] || [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] && break
              sleep 10
            done
          else
            echo "✅ No other deploy running — proceeding immediately"
          fi

      # ── Backup for rollback ──
      - name: "Backup current state"
        id: backup
        run: |
          PREV=$(aws ssm get-parameter --name "${{ env.SSM_TAG }}" \
            --query "Parameter.Value" --output text 2>/dev/null || echo "latest")
          echo "prev_tag=$PREV" >> "$GITHUB_OUTPUT"
          aws ssm put-parameter --name "${{ env.SSM_TAG }}_previous" \
            --value "$PREV" --type String --overwrite

          MANIFEST=$(aws ssm get-parameter --name "${{ env.SSM_RELEASE }}" \
            --query "Parameter.Value" --output text 2>/dev/null || echo '{}')
          aws ssm put-parameter --name "${{ env.SSM_RELEASE }}_previous" \
            --value "$MANIFEST" --type String --overwrite
          echo "📦 Backed up: tag=$PREV"

      # ── Update SSM ──
      - name: "Update SSM image tag"
        run: |
          aws ssm put-parameter --name "${{ env.SSM_TAG }}" \
            --value "${{ needs.build.outputs.image_tag }}" --type String --overwrite
          echo "✅ SSM ${{ env.SSM_TAG }} = ${{ needs.build.outputs.image_tag }}"

      - name: "Update release manifest"
        run: |
          CURRENT=$(aws ssm get-parameter --name "${{ env.SSM_RELEASE }}" \
            --query "Parameter.Value" --output text 2>/dev/null \
            || echo '{"release_id":"unknown","services":{}}')
          NEW=$(echo "$CURRENT" | jq -c \
            --arg tag "${{ needs.build.outputs.image_tag }}" \
            --arg rid "rel-${{ github.run_id }}" \
            '.release_id = $rid | .services.${{ env.APP_NAME }} = $tag')
          aws ssm put-parameter --name "${{ env.SSM_RELEASE }}" \
            --value "$NEW" --type String --overwrite
          echo "✅ Manifest: $NEW"

      # ── Scale up GREEN ──
      - name: "Scale up GREEN"
        run: |
          echo "Scaling GREEN to desired=1"
          aws autoscaling update-auto-scaling-group \
            --auto-scaling-group-name "${{ steps.infra.outputs.asg_green }}" \
            --min-size 1 --desired-capacity 1 --max-size 4

      # ── Trigger refresh ──
      - name: "Trigger GREEN refresh"
        id: refresh
        run: |
          aws autoscaling cancel-instance-refresh \
            --auto-scaling-group-name "${{ steps.infra.outputs.asg_green }}" 2>/dev/null || true
          sleep 5
          RID=$(aws autoscaling start-instance-refresh \
            --auto-scaling-group-name "${{ steps.infra.outputs.asg_green }}" \
            --strategy Rolling \
            --preferences '{"MinHealthyPercentage":50,"InstanceWarmup":120}' \
            --query "InstanceRefreshId" --output text)
          echo "refresh_id=$RID" >> "$GITHUB_OUTPUT"
          echo "🔄 Refresh: $RID"

      # ── Wait for healthy ──
      - name: "Wait for healthy GREEN"
        run: |
          RID="${{ steps.refresh.outputs.refresh_id }}"
          for i in $(seq 1 30); do
            STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "${{ steps.infra.outputs.asg_green }}" \
              --instance-refresh-ids "$RID" \
              --query "InstanceRefreshes[0].Status" --output text 2>/dev/null || echo "Pending")
            PCT=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "${{ steps.infra.outputs.asg_green }}" \
              --instance-refresh-ids "$RID" \
              --query "InstanceRefreshes[0].PercentageComplete" --output text 2>/dev/null || echo "0")
            echo "  [$i/30] Status: $STATUS | Progress: $PCT%"
            [ "$STATUS" = "Successful" ] && echo "✅ GREEN healthy!" && exit 0
            [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] && echo "❌ Refresh failed!" && exit 1
            sleep 20
          done
          echo "⏰ Timeout" && exit 1

      # ── Switch ALB traffic → GREEN ──
      - name: "Switch traffic to GREEN"
        run: |
          echo "🔄 Switching ALB traffic to GREEN..."

          aws elbv2 modify-listener \
            --listener-arn "${{ steps.infra.outputs.listener_arn }}" \
            --default-actions "Type=forward,TargetGroupArn=${{ steps.infra.outputs.tg_app1_green }}"

          RULE_ARN=$(aws elbv2 describe-rules \
            --listener-arn "${{ steps.infra.outputs.listener_arn }}" \
            --query "Rules[?Priority=='100'].RuleArn" --output text)
          if [ -n "$RULE_ARN" ] && [ "$RULE_ARN" != "None" ]; then
            aws elbv2 modify-rule --rule-arn "$RULE_ARN" \
              --actions "Type=forward,TargetGroupArn=${{ steps.infra.outputs.tg_app2_green }}"
          fi
          echo "✅ Traffic now on GREEN"

      # ── Lock GREEN min=1 so auto-scale won't kill it ──
      - name: "Lock GREEN and shut down BLUE"
        run: |
          # GREEN is now serving traffic — set min=1 so it never goes to 0
          aws autoscaling update-auto-scaling-group \
            --auto-scaling-group-name "${{ steps.infra.outputs.asg_green }}" \
            --min-size 1
          echo "✅ GREEN: min=1 (auto-scale: 1→4 based on CPU)"

          # BLUE is no longer needed — scale to 0 (zero cost)
          aws autoscaling update-auto-scaling-group \
            --auto-scaling-group-name "${{ steps.infra.outputs.asg_blue }}" \
            --min-size 0 --desired-capacity 0
          echo "✅ BLUE: 0 instances (zero cost)"

      - name: "Deploy complete"
        if: success()
        run: |
          echo "═══════════════════════════════════════"
          echo "  ✅ FULLY AUTOMATIC DEPLOY COMPLETE"
          echo "  App:     ${{ env.APP_NAME }}"
          echo "  Tag:     ${{ needs.build.outputs.image_tag }}"
          echo "  Traffic: GREEN (live, auto-scales 1→4)"
          echo "  BLUE:    0 instances (zero cost)"
          echo "═══════════════════════════════════════"

      # ── AUTO-ROLLBACK on failure ──
      - name: "Rollback on failure"
        if: failure()
        run: |
          echo "❌ Deploy failed — auto-rolling back..."

          # Restore SSM tags
          aws ssm put-parameter --name "${{ env.SSM_TAG }}" \
            --value "${{ steps.backup.outputs.prev_tag }}" --type String --overwrite 2>/dev/null || true
          PREV_MANIFEST=$(aws ssm get-parameter --name "${{ env.SSM_RELEASE }}_previous" \
            --query "Parameter.Value" --output text 2>/dev/null || echo "")
          if [ -n "$PREV_MANIFEST" ] && [ "$PREV_MANIFEST" != "None" ]; then
            aws ssm put-parameter --name "${{ env.SSM_RELEASE }}" \
              --value "$PREV_MANIFEST" --type String --overwrite
          fi

          # Switch ALB back to BLUE
          aws elbv2 modify-listener \
            --listener-arn "${{ steps.infra.outputs.listener_arn }}" \
            --default-actions "Type=forward,TargetGroupArn=${{ steps.infra.outputs.tg_app1_blue }}" 2>/dev/null || true
          RULE_ARN=$(aws elbv2 describe-rules \
            --listener-arn "${{ steps.infra.outputs.listener_arn }}" \
            --query "Rules[?Priority=='100'].RuleArn" --output text 2>/dev/null || echo "")
          if [ -n "$RULE_ARN" ] && [ "$RULE_ARN" != "None" ]; then
            aws elbv2 modify-rule --rule-arn "$RULE_ARN" \
              --actions "Type=forward,TargetGroupArn=${{ steps.infra.outputs.tg_app2_blue }}" 2>/dev/null || true
          fi

          # Scale down GREEN
          aws autoscaling cancel-instance-refresh \
            --auto-scaling-group-name "${{ steps.infra.outputs.asg_green }}" 2>/dev/null || true
          aws autoscaling update-auto-scaling-group \
            --auto-scaling-group-name "${{ steps.infra.outputs.asg_green }}" \
            --min-size 0 --desired-capacity 0 2>/dev/null || true

          # Scale BLUE back up
          aws autoscaling update-auto-scaling-group \
            --auto-scaling-group-name "${{ steps.infra.outputs.asg_blue }}" \
            --min-size 1 --desired-capacity 1 --max-size 4 2>/dev/null || true

          # Scale GREEN to 0
          aws autoscaling update-auto-scaling-group \
            --auto-scaling-group-name "${{ steps.infra.outputs.asg_green }}" \
            --min-size 0 2>/dev/null || true

          echo "✅ Auto-rollback complete — traffic on BLUE"
